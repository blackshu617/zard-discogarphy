<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Frameset//EN">
<html lang="ja">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZARD DISCOGRAPHY</title>
<script type="text/javascript">
    /* Cảm biến Mobile: Nhỏ hơn 768px thì đá thẳng sang profile.html, giấu frameset đi */
    if (window.innerWidth <= 768) {
        window.location.replace("profile.html");
    }
</script>
</head>
<!-- Khung trái hiện Menu, khung phải hiện Profile -->
<frameset cols="150,*">
 <frame src="menu.html" name="left">
 <frame src="profile.html" name="right">
</frameset>
</html>
