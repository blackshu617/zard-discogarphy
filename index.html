  <img src="yt_200.png" width="20" style="margin-right: 5px; flex-shrink: 0;">
  <b>LATEST ON WEZARD</b>
</div>

<div style="width: calc(100% - 0px); max-width: 460px; box-sizing: border-box; margin: 0 auto; text-align: left; font-size: 14px; padding: 10px 15px; background-color: #f8f9fa;">
  <ul id="yt-list" style="margin: 0; padding-left: 20px; list-style-type: square; line-height: 1.6; box-sizing: border-box;">
    <li>Loading data...</li>
  </ul>
</div>

<script type="text/javascript">
  const ytFeedUrl = 'https://www.youtube.com/feeds/videos.xml?channel_id=UC9OXNkUKmf3bUx8N9l8jM2w';
  const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(ytFeedUrl)}`;
  fetch(apiUrl)
    .then(response => response.json())
    .then(data => {
      let html = '';
      for(let i = 0; i < 3; i++) {
        let video = data.items[i];
        
        let dateObj = new Date(video.pubDate.replace(' ', 'T'));
        let yyyy = dateObj.getFullYear();
        let mm = String(dateObj.getMonth() + 1).padStart(2, '0');
        let dd = String(dateObj.getDate()).padStart(2, '0');
        let dateStr = `${yyyy}.${mm}.${dd}`;

        html += `<li style="margin-bottom: 2px;">
                   <div style="display: flex; align-items: center; width: 100%;">
                     <span style="color: #000000; font-size: 14px; flex-shrink: 0; margin-right: 5px;">${dateStr} -</span>
                     <a href="${video.link}" target="_blank" title="${video.title}" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1;">${video.title}</a>
                   </div>
                 </li>`;
      }
      document.getElementById('yt-list').innerHTML = html;
    })
    .catch(error => {
      document.getElementById('yt-list').innerHTML = '<li>Error loading feed.</li>';
    });
</script>
<!--WEZARD Youtube auto update -END-->
