<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Frameset//EN">
<html lang="ja">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZARD DISCOGRAPHYa</title>
<script type="text/javascript">
 var isMenuOpen = false, currentMode = "unknown";

 /* CHECK LAYOUT */
 function checkLayout() {
  var pw = window.innerWidth || document.documentElement.clientWidth;
  var fs = document.getElementById('mainFrameset'), lf = document.getElementById('leftFrame'), rf = document.getElementById('rightFrame');
  if (pw < 800) {
   if (currentMode !== "mobile") { currentMode = "mobile"; isMenuOpen = false; lf.noResize = true; rf.noResize = true; fs.cols = ""; fs.cols = "0,*"; }
   tellChild('show');
  } else {
   if (currentMode !== "desktop") { currentMode = "desktop"; isMenuOpen = false; lf.noResize = false; rf.noResize = false; fs.cols = ""; fs.cols = "150,*"; }
   tellChild('hide');
  }
 }

 /* TOGGLE MENU */
 function toggleMenu() {
  if ((window.innerWidth || document.documentElement.clientWidth) < 800) {
   isMenuOpen = !isMenuOpen;
   var fs = document.getElementById('mainFrameset'); fs.cols = ""; fs.cols = isMenuOpen ? "150,*" : "0,*";
  }
 }

 /* MESSENGER */
 function tellChild(msg) {
  var rf = document.getElementById('rightFrame');
  if (rf && rf.contentWindow) rf.contentWindow.postMessage(msg, '*');
 }

 /* RECEIVE MESSAGES */
 window.addEventListener('message', function(e) {
  if (e.data === 'toggle') toggleMenu();
  if (e.data === 'load') {
   if ((window.innerWidth || document.documentElement.clientWidth) < 800 && isMenuOpen) {
    isMenuOpen = false; document.getElementById('mainFrameset').cols = "0,*";
   }
   checkLayout(); 
  }
 });

 window.onresize = checkLayout;
</script>
</head>

<frameset cols="0,*" id="mainFrameset" onload="checkLayout()">
 <frame src="menu.html" name="left" id="leftFrame">
 <frame src="profile.html" name="right" id="rightFrame">
</frameset>
</html>
