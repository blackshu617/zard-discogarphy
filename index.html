<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Frameset//EN">
<html lang="ja">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZARD DISCOGRAPHY</title>
<script type="text/javascript">
    // Mặc định: màn hình > 1250px thì menu mở, nhỏ hơn thì menu đóng
    var isMenuOpen = window.innerWidth > 1250;

    function initFrames() {
        var fs = document.getElementById("myFrameset");
        if (window.innerWidth <= 1250) { // Đổi mốc thành 1250 giống sadgrl
            fs.cols = "0,*"; 
            isMenuOpen = false;
        } else {
            fs.cols = "150,*"; 
            isMenuOpen = true;
        }
    }

    function toggleMenu() {
        var fs = document.getElementById("myFrameset");
        if (isMenuOpen) {
            fs.cols = "0,*"; 
            isMenuOpen = false;
        } else {
            fs.cols = "150,*"; 
            isMenuOpen = true;
        }
    }

    window.onload = initFrames;
    window.onresize = initFrames;
</script>
</head>
<frameset cols="150,*" id="myFrameset">
 <frame src="menu.html" name="left">
 <frame src="profile.html" name="right">
</frameset>
</html>
